<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片管理 - ZHAMIT 后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #f5f5f5; }
        .top-bar { background: #1a1a1a; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; }
        .top-bar a { color: white; text-decoration: none; margin-left: 1rem; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; }
        h1 { margin-bottom: 1rem; }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 2rem;
        }
        .upload-area:hover { border-color: #1a1a1a; background: #fafafa; }
        
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .image-item {
            background: #f9f9f9;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .image-item img { width: 100%; height: 150px; object-fit: cover; }
        .image-info { padding: 0.75rem; }
        .image-url { font-size: 0.7rem; color: #666; word-break: break-all; margin-bottom: 0.5rem; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.7rem; cursor: pointer; border: none; border-radius: 4px; }
        .btn-copy { background: #1a1a1a; color: white; }
        .btn-delete { background: #d32f2f; color: white; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 8px 16px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h2>ZHAMIT 管理后台</h2>
        <div>
            <a href="/admin/pages.html">页面管理</a>
            <a href="/admin/nav.html">导航菜单</a>
            <a href="/admin/images.html">图片管理</a>
            <a href="/admin/settings.html">站点设置</a>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <h1>图片管理</h1>
            
            <div class="upload-area" id="uploadArea">
                <p>📸 点击或拖拽图片到此上传</p>
                <p style="font-size: 0.8rem; color: #999;">支持 JPG, PNG, GIF, WebP，最大 10MB</p>
                <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
            </div>
            
            <div id="imageGrid" class="image-grid">
                <div style="text-align: center; padding: 2rem; color: #999;">加载中...</div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast">链接已复制</div>
    
    <script>
        async function loadImages() {
            const grid = document.getElementById('imageGrid');
            try {
                const res = await fetch('/api/images');
                const images = await res.json();
                
                if (images.length === 0) {
                    grid.innerHTML = '<div style="text-align:center; padding:2rem; color:#999;">暂无图片，点击上方区域上传</div>';
                    return;
                }
                
                grid.innerHTML = images.map(img => `
                    <div class="image-item" data-key="${img.key}">
                        <img src="${img.url}" loading="lazy">
                        <div class="image-info">
                            <div class="image-url">${img.key.split('/').pop()}</div>
                            <button class="btn-sm btn-copy" onclick="copyUrl('${img.url}')">复制链接</button>
                            <button class="btn-sm btn-delete" onclick="deleteImage('${img.key}')">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                grid.innerHTML = '<div style="text-align:center; padding:2rem; color:#999;">加载失败</div>';
            }
        }
        
        async function uploadFiles(files) {
            for (const file of files) {
                if (!file.type.startsWith('image/')) {
                    alert(`${file.name} 不是图片格式`);
                    continue;
                }
                if (file.size > 10 * 1024 * 1024) {
                    alert(`${file.name} 超过 10MB`);
                    continue;
                }
                
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const res = await fetch('/api/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) {
                        loadImages();
                    } else {
                        alert(`上传失败: ${data.error}`);
                    }
                } catch(e) {
                    alert(`上传失败`);
                }
            }
        }
        
        function copyUrl(url) {
            navigator.clipboard.writeText(url);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }
        
        async function deleteImage(key) {
            if (!confirm('确定删除这张图片吗？')) return;
            try {
                const res = await fetch('/api/delete-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                if (res.ok) {
                    loadImages();
                } else {
                    alert('删除失败');
                }
            } catch(e) {
                alert('删除失败');
            }
        }
        
        // 上传区域事件
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#1a1a1a';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#ddd';
        });
