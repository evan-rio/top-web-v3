<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面装修 - ZHAMIT 后台</title>
    
    <!-- 登录检查 -->
    <script>
        (function() {
            if (window.location.pathname.includes('/login.html')) return;
            const hasCookie = document.cookie.split(';').some(c => c.trim().startsWith('zhamit_admin=1'));
            if (!hasCookie) {
                window.location.href = '/admin/login.html';
            }
        })();
    </script>
    
    <!-- SortableJS 拖拽排序 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            overflow: hidden;
        }
        
        /* 顶部栏 */
        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .top-bar-left h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .top-bar-left a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .top-bar-left a:hover { color: #1677ff; }
        .top-bar-right {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #d9d9d9;
            background: #fff;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #1677ff;
            border-color: #1677ff;
            color: white;
        }
        .btn-primary:hover { background: #4096ff; }
        
        /* 主布局 */
        .editor-layout {
            display: flex;
            margin-top: 56px;
            height: calc(100vh - 56px);
        }
        
        /* 左侧模块库 */
        .module-library {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e8e8e8;
            overflow-y: auto;
            padding: 20px 16px;
        }
        .library-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #333;
        }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .module-card {
            background: #fafafa;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            cursor: grab;
            transition: all 0.2s;
        }
        .module-card:hover {
            border-color: #1677ff;
            background: #f0f7ff;
        }
        .module-card:active { cursor: grabbing; }
        .module-icon { font-size: 24px; margin-bottom: 8px; }
        .module-name { font-size: 12px; color: #666; }
        
        /* 中间画布区 */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f5f5f5;
        }
        .canvas-toolbar {
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .canvas-toolbar span {
            font-size: 12px;
            color: #999;
        }
        .canvas-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .canvas {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            min-height: 600px;
            padding: 24px;
        }
        
        /* 模块样式 */
        .module-item {
            position: relative;
            margin-bottom: 20px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            background: #fff;
            transition: box-shadow 0.2s;
        }
        .module-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .module-item:hover .module-toolbar {
            display: flex;
        }
        .module-toolbar {
            position: absolute;
            top: -32px;
            right: 0;
            display: none;
            gap: 4px;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 4px;
            z-index: 10;
        }
        .module-toolbar button {
            padding: 4px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #f5f5f5;
            transition: all 0.2s;
        }
        .module-toolbar button:hover { background: #e8e8e8; }
        .toolbar-edit { color: #1677ff; }
        .toolbar-code { color: #52c41a; }
        .toolbar-copy { color: #fa8c16; }
        .toolbar-delete { color: #ff4d4f; }
        .module-content {
            padding: 16px;
            cursor: pointer;
        }
        
        /* 编辑弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 550px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 13px;
        }
        .form-group textarea {
            min-height: 150px;
            font-family: monospace;
            resize: vertical;
        }
        .color-row {
            display: flex;
            gap: 12px;
        }
        .color-row > div { flex: 1; }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .modal-buttons button {
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .code-mode-hint {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #333;
            color: white;
            border-radius: 8px;
            font-size: 13px;
            z-index: 1000;
            display: none;
        }
        
        .sortable-drag { opacity: 0.4; background: #f0f7ff; }
        
        @media (max-width: 768px) {
            .module-library { width: 200px; }
            .module-toolbar { top: -28px; }
            .module-toolbar button { padding: 2px 6px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-left">
            <h2>ZHAMIT 页面装修</h2>
            <a href="/admin/pages.html">返回页面管理</a>
        </div>
        <div class="top-bar-right">
            <button class="btn" id="previewBtn">👁️ 预览</button>
            <button class="btn btn-primary" id="saveBtn">💾 保存发布</button>
        </div>
    </div>
    
    <div class="editor-layout">
        <!-- 左侧模块库 -->
        <div class="module-library">
            <div class="library-title">📦 模块库（拖拽添加）</div>
            <div class="module-grid">
                <div class="module-card" draggable="true" data-type="text"><div class="module-icon">📝</div><div class="module-name">文字</div></div>
                <div class="module-card" draggable="true" data-type="heading"><div class="module-icon">📌</div><div class="module-name">标题</div></div>
                <div class="module-card" draggable="true" data-type="image"><div class="module-icon">🖼️</div><div class="module-name">图片</div></div>
                <div class="module-card" draggable="true" data-type="button"><div class="module-icon">🔘</div><div class="module-name">按钮</div></div>
                <div class="module-card" draggable="true" data-type="divider"><div class="module-icon">➖</div><div class="module-name">分隔线</div></div>
                <div class="module-card" draggable="true" data-type="richText"><div class="module-icon">📄</div><div class="module-name">富文本</div></div>
            </div>
        </div>
        
        <!-- 中间画布区 -->
        <div class="canvas-area">
            <div class="canvas-toolbar">
                <span>✨ 鼠标悬停模块显示操作栏</span>
                <span>📌 拖拽模块可调整顺序 | 每个模块可单独编辑样式或代码</span>
            </div>
            <div class="canvas-container">
                <div id="canvas" class="canvas"></div>
            </div>
        </div>
    </div>
    
    <!-- 编辑弹窗（样式编辑） -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">编辑模块</h3>
            <div id="modalFields"></div>
            <div class="modal-buttons">
                <button class="btn" id="modalSaveBtn">保存</button>
                <button class="btn" id="modalCancelBtn" style="background:#f0f0f0;">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 代码编辑弹窗（单独模块的源代码） -->
    <div id="codeModal" class="modal">
        <div class="modal-content">
            <h3>编辑模块源代码</h3>
            <div class="code-mode-hint">✏️ 直接修改此模块的 HTML 代码，保存后立即生效</div>
            <div class="form-group">
                <textarea id="codeEditorContent" rows="12" style="font-family: monospace;"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" id="codeSaveBtn">保存并应用</button>
                <button class="btn" id="codeCancelBtn" style="background:#f0f0f0;">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 预览弹窗 -->
    <div id="previewModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000;">
        <div style="position:absolute; top:20px; right:20px;"><button id="closePreviewBtn" style="background:#fff; border:none; padding:8px 16px; border-radius:6px;">关闭预览</button></div>
        <iframe id="previewFrame" style="width:100%; height:100%; border:none; background:#fff;"></iframe>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        let modules = [];
        let currentEditIndex = null;
        let currentCodeIndex = null;
        let sortable = null;
        
        // 模块模板
        const templates = {
            text: { type: 'text', content: '双击编辑文字', styles: { color: '#333', fontSize: '14px', fontWeight: 'normal', textDecoration: 'none' } },
            heading: { type: 'heading', content: '新标题', level: 'h2', styles: { color: '#333', fontSize: '24px', fontWeight: 'bold' } },
            image: { type: 'image', src: 'https://picsum.photos/400/200', alt: '图片', width: '100%' },
            button: { type: 'button', text: '按钮', url: '#', styles: { backgroundColor: '#1677ff', color: '#fff', padding: '8px 20px', borderRadius: '6px' } },
            divider: { type: 'divider', styles: { height: '1px', backgroundColor: '#e8e8e8', margin: '20px 0' } },
            richText: { type: 'richText', content: '<p>这里是富文本内容，支持<strong>加粗</strong>和<em>斜体</em></p>' }
        };
        
        // 生成模块HTML
        function renderModuleContent(mod) {
            switch(mod.type) {
                case 'text':
                    return `<div style="color:${mod.styles?.color || '#333'}; font-size:${mod.styles?.fontSize || '14px'}; font-weight:${mod.styles?.fontWeight || 'normal'}; text-decoration:${mod.styles?.textDecoration || 'none'};">${escapeHtml(mod.content || '')}</div>`;
                case 'heading':
                    const tag = mod.level || 'h2';
                    return `<${tag} style="color:${mod.styles?.color || '#333'}; font-size:${mod.styles?.fontSize || '24px'}; font-weight:${mod.styles?.fontWeight || 'bold'};">${escapeHtml(mod.content || '')}</${tag}>`;
                case 'image':
                    return `<img src="${mod.src || ''}" alt="${mod.alt || ''}" style="width:${mod.width || '100%'}; max-width:100%; border-radius:8px;">`;
                case 'button':
                    return `<a href="${mod.url || '#'}" style="display:inline-block; background:${mod.styles?.backgroundColor || '#1677ff'}; color:${mod.styles?.color || '#fff'}; padding:${mod.styles?.padding || '8px 20px'}; border-radius:${mod.styles?.borderRadius || '6px'}; text-decoration:none;">${escapeHtml(mod.text || '按钮')}</a>`;
                case 'divider':
                    return `<hr style="height:${mod.styles?.height || '1px'}; background:${mod.styles?.backgroundColor || '#e8e8e8'}; border:none; margin:${mod.styles?.margin || '20px 0'};">`;
                case 'richText':
                    return `<div class="rich-text">${mod.content || ''}</div>`;
                default:
                    return '';
            }
        }
        
        // 渲染画布
        function renderCanvas() {
            const canvas = document.getElementById('canvas');
            if (!modules.length) {
                canvas.innerHTML = '<div style="text-align:center; padding:60px 20px; color:#999;">✨ 从左侧拖拽模块到这里开始装修</div>';
                return;
            }
            
            canvas.innerHTML = modules.map((mod, idx) => {
                const contentHtml = renderModuleContent(mod);
                return `<div class="module-item" data-index="${idx}">
                    <div class="module-toolbar">
                        <button class="toolbar-edit" data-index="${idx}" data-action="edit">✏️ 样式</button>
                        <button class="toolbar-code" data-index="${idx}" data-action="code">&lt;/&gt; 代码</button>
                        <button class="toolbar-copy" data-index="${idx}" data-action="copy">📋 复制</button>
                        <button class="" data-index="${idx}" data-action="up">⬆️ 上移</button>
                        <button class="" data-index="${idx}" data-action="down">⬇️ 下移</button>
                        <button class="toolbar-delete" data-index="${idx}" data-action="delete">🗑️ 删除</button>
                    </div>
                    <div class="module-content" data-index="${idx}">
                        ${contentHtml}
                    </div>
                </div>`;
            }).join('');
            
            // 绑定工具栏事件
            document.querySelectorAll('.module-toolbar button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    const action = btn.dataset.action;
                    handleModuleAction(idx, action);
                });
            });
            
            // 点击模块内容也可编辑样式
            document.querySelectorAll('.module-content').forEach(el => {
                el.addEventListener('click', (e) => {
                    const idx = parseInt(el.dataset.index);
                    openEditModal(idx);
                });
            });
            
            // 初始化拖拽排序
            if (sortable) sortable.destroy();
            sortable = new Sortable(canvas, {
                animation: 150,
                handle: '.module-item',
                onEnd: () => {
                    const newModules = [];
                    document.querySelectorAll('.module-item').forEach(el => {
                        const idx = parseInt(el.dataset.index);
                        newModules.push(modules[idx]);
                    });
                    modules = newModules;
                    renderCanvas();
                }
            });
        }
        
        // 模块操作
        function handleModuleAction(idx, action) {
            if (action === 'edit') {
                openEditModal(idx);
            } else if (action === 'code') {
                openCodeModal(idx);
            } else if (action === 'copy') {
                const newModule = JSON.parse(JSON.stringify(modules[idx]));
                if (newModule.type === 'text' || newModule.type === 'heading') {
                    newModule.content = (newModule.content || '') + ' (副本)';
                } else if (newModule.type === 'button') {
                    newModule.text = (newModule.text || '') + ' (副本)';
                }
                modules.splice(idx + 1, 0, newModule);
                renderCanvas();
                showToast('已复制模块');
            } else if (action === 'up' && idx > 0) {
                [modules[idx-1], modules[idx]] = [modules[idx], modules[idx-1]];
                renderCanvas();
            } else if (action === 'down' && idx < modules.length - 1) {
                [modules[idx], modules[idx+1]] = [modules[idx+1], modules[idx]];
                renderCanvas();
            } else if (action === 'delete') {
                modules.splice(idx, 1);
                renderCanvas();
                showToast('已删除模块');
            }
        }
        
        // 打开样式编辑弹窗
        function openEditModal(index) {
            currentEditIndex = index;
            const mod = modules[index];
            const fieldsDiv = document.getElementById('modalFields');
            const titleMap = { text: '文字模块', heading: '标题模块', image: '图片模块', button: '按钮模块', divider: '分隔线', richText: '富文本模块' };
            document.getElementById('modalTitle').textContent = `编辑${titleMap[mod.type] || '模块'}`;
            
            let html = '';
            if (mod.type === 'text' || mod.type === 'heading') {
                html = `
                    <div class="form-group"><label>内容</label><input type="text" id="editContent" value="${escapeHtml(mod.content || '')}"></div>
                    <div class="color-row">
                        <div class="form-group"><label>文字颜色</label><input type="color" id="editColor" value="${mod.styles?.color || '#333333'}"></div>
                        <div class="form-group"><label>字体大小</label><input type="text" id="editFontSize" value="${mod.styles?.fontSize || (mod.type === 'heading' ? '24px' : '14px')}"></div>
                    </div>
                    <div class="color-row">
                        <div class="form-group"><label>粗细</label><select id="editFontWeight"><option value="normal">正常</option><option value="bold">粗体</option></select></div>
                        <div class="form-group"><label>下划线</label><select id="editDecoration"><option value="none">无</option><option value="underline">下划线</option></select></div>
                    </div>`;
                if (mod.type === 'heading') {
                    html += `<div class="form-group"><label>标题级别</label><select id="editLevel"><option value="h1">H1</option><option value="h2">H2</option><option value="h3">H3</option></select></div>`;
                }
            } else if (mod.type === 'image') {
                html = `
                    <div class="form-group"><label>图片地址</label><input type="text" id="editSrc" value="${escapeHtml(mod.src || '')}"></div>
                    <div class="form-group"><label>替代文字</label><input type="text" id="editAlt" value="${escapeHtml(mod.alt || '')}"></div>
                    <div class="form-group"><label>宽度</label><input type="text" id="editWidth" value="${mod.width || '100%'}"></div>`;
            } else if (mod.type === 'button') {
                html = `
                    <div class="form-group"><label>按钮文字</label><input type="text" id="editText" value="${escapeHtml(mod.text || '')}"></div>
                    <div class="form-group"><label>链接</label><input type="text" id="editUrl" value="${escapeHtml(mod.url || '#')}"></div>
                    <div class="color-row">
                        <div class="form-group"><label>背景色</label><input type="color" id="editBgColor" value="${mod.styles?.backgroundColor || '#1677ff'}"></div>
                        <div class="form-group"><label>文字颜色</label><input type="color" id="editBtnColor" value="${mod.styles?.color || '#ffffff'}"></div>
                    </div>`;
            } else if (mod.type === 'richText') {
                html = `<div class="form-group"><label>富文本内容</label><textarea id="editRichContent" rows="6">${escapeHtml(mod.content || '')}</textarea></div>`;
            } else if (mod.type === 'divider') {
                html = `<div class="form-group"><label>分隔线颜色</label><input type="color" id="editDividerColor" value="${mod.styles?.backgroundColor || '#e8e8e8'}"></div>`;
            }
            
            fieldsDiv.innerHTML = html;
            
            // 设置当前值
            setTimeout(() => {
                if (mod.type === 'text' || mod.type === 'heading') {
                    if (document.getElementById('editFontWeight')) document.getElementById('editFontWeight').value = mod.styles?.fontWeight || 'normal';
                    if (document.getElementById('editDecoration')) document.getElementById('editDecoration').value = mod.styles?.textDecoration || 'none';
                    if (mod.type === 'heading' && document.getElementById('editLevel')) document.getElementById('editLevel').value = mod.level || 'h2';
                }
            }, 0);
            
            document.getElementById('editModal').style.display = 'flex';
        }
        
        // 打开代码编辑弹窗（单独模块的源代码）
        function openCodeModal(index) {
            currentCodeIndex = index;
            const mod = modules[index];
            const currentHtml = renderModuleContent(mod);
            document.getElementById('codeEditorContent').value = currentHtml;
            document.getElementById('codeModal').style.display = 'flex';
        }
        
        // 保存样式编辑
        function saveModuleEdit() {
            if (currentEditIndex === null) return;
            const mod = modules[currentEditIndex];
            
            if (mod.type === 'text' || mod.type === 'heading') {
                mod.content = document.getElementById('editContent')?.value || '';
                mod.styles = {
                    color: document.getElementById('editColor')?.value || '#333',
                    fontSize: document.getElementById('editFontSize')?.value || (mod.type === 'heading' ? '24px' : '14px'),
                    fontWeight: document.getElementById('editFontWeight')?.value || 'normal',
                    textDecoration: document.getElementById('editDecoration')?.value || 'none'
                };
                if (mod.type === 'heading') {
                    mod.level = document.getElementById('editLevel')?.value || 'h2';
                }
            } else if (mod.type === 'image') {
                mod.src = document.getElementById('editSrc')?.value || '';
                mod.alt = document.getElementById('editAlt')?.value || '';
                mod.width = document.getElementById('editWidth')?.value || '100%';
            } else if (mod.type === 'button') {
                mod.text = document.getElementById('editText')?.value || '';
                mod.url = document.getElementById('editUrl')?.value || '#';
                mod.styles = {
                    backgroundColor: document.getElementById('editBgColor')?.value || '#1677ff',
                    color: document.getElementById('editBtnColor')?.value || '#ffffff',
                    padding: '8px 20px',
                    borderRadius: '6px'
                };
            } else if (mod.type === 'richText') {
                mod.content = document.getElementById('editRichContent')?.value || '';
            } else if (mod.type === 'divider') {
                mod.styles.backgroundColor = document.getElementById('editDividerColor')?.value || '#e8e8e8';
            }
            
            closeEditModal();
            renderCanvas();
            showToast('模块已更新');
        }
        
        // 保存代码编辑
        function saveCodeEdit() {
            if (currentCodeIndex === null) return;
            const newHtml = document.getElementById('codeEditorContent').value;
            const mod = modules[currentCodeIndex];
            
            // 将模块标记为自定义HTML模式
            mod.isCustomHtml = true;
            mod.customHtml = newHtml;
            // 同时更新渲染方式
            mod.rawHtml = newHtml;
            
            closeCodeModal();
            renderCanvas();
            showToast('代码已应用');
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditIndex = null;
        }
        
        function closeCodeModal() {
            document.getElementById('codeModal').style.display = 'none';
            currentCodeIndex = null;
        }
        
        // 添加模块
        function addModule(type) {
            const newModule = JSON.parse(JSON.stringify(templates[type]));
            modules.push(newModule);
            renderCanvas();
            showToast(`已添加${type === 'text' ? '文字' : type === 'heading' ? '标题' : type === 'image' ? '图片' : type === 'button' ? '按钮' : type === 'divider' ? '分隔线' : '富文本'}模块`);
        }
        
        // 拖拽添加
        function setupDragDrop() {
            const draggables = document.querySelectorAll('[draggable="true"]');
            draggables.forEach(el => {
                el.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', el.dataset.type);
                });
            });
            const canvas = document.getElementById('canvas');
            canvas.addEventListener('dragover', (e) => e.preventDefault());
            canvas.addEventListener('drop', (e) => {
                e.preventDefault();
                const type = e.dataTransfer.getData('text/plain');
                if (type) addModule(type);
            });
        }
        
        // 生成最终HTML
        function modulesToHtml() {
            return modules.map(mod => {
                if (mod.isCustomHtml && mod.customHtml) {
                    return mod.customHtml;
                }
                return renderModuleContent(mod);
            }).join('\n');
        }
        
        // 预览
        function preview() {
            const modal = document.getElementById('previewModal');
            const iframe = document.getElementById('previewFrame');
            const content = modulesToHtml();
            iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0; padding:20px; font-family:system-ui;}</style></head><body>${content || '<p>暂无内容</p>'}</body></html>`;
            modal.style.display = 'block';
        }
        
        // 保存
        async function savePage() {
            const content = modulesToHtml();
            const urlParams = new URLSearchParams(window.location.search);
            const pageId = urlParams.get('id');
            
            const path = prompt('页面路径 (如 /about):', pageId ? '' : '/new-page');
            if (!path) return;
            const title = prompt('页面标题:', 'New Page');
            if (!title) return;
            
            const data = {
                id: pageId || null,
                path: path,
                title_en: title,
                content: content,
                status: 1
            };
            
            try {
                const res = await fetch('/api/pages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showToast('保存成功！');
                    setTimeout(() => { window.location.href = '/admin/pages.html'; }, 1000);
                } else {
                    showToast('保存失败');
                }
            } catch(e) {
                showToast('保存失败: ' + e.message);
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        // 加载已有页面内容
        async function loadExistingPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const pageId = urlParams.get('id');
            if (!pageId) return;
            try {
                const res = await fetch(`/api/pages?id=${pageId}`);
                const page = await res.json();
                if (page && page.content) {
                    // 简单解析：如果是HTML，可以尝试解析成模块，这里先保留原内容
                    showToast('已加载页面，当前编辑器新建内容会覆盖原有内容');
                }
            } catch(e) {}
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadExistingPage();
            setupDragDrop();
            renderCanvas();
            document.getElementById('previewBtn').addEventListener('click', preview);
            document.getElementById('saveBtn').addEventListener('click', savePage);
            document.getElementById('closePreviewBtn').addEventListener('click', () => {
                document.getElementById('previewModal').style.display = 'none';
            });
            document.getElementById('modalSaveBtn').addEventListener('click', saveModuleEdit);
            document.getElementById('modalCancelBtn').addEventListener('click', closeEditModal);
            document.getElementById('codeSaveBtn').addEventListener('click', saveCodeEdit);
            document.getElementById('codeCancelBtn').addEventListener('click', closeCodeModal);
        });
    </script>
</body>
</html>
