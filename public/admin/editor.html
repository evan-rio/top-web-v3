<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面装修 - ZHAMIT 后台</title>
    
    <!-- 登录检查 -->
    <script>
        (function() {
            if (window.location.pathname.includes('/login.html')) return;
            const hasCookie = document.cookie.split(';').some(c => c.trim().startsWith('zhamit_admin=1'));
            if (!hasCookie) {
                window.location.href = '/admin/login.html';
            }
        })();
    </script>
    
    <!-- SortableJS 拖拽库 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            overflow: hidden;
        }
        
        /* 顶部栏 */
        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .top-bar-left h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .top-bar-left a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            margin-left: 16px;
        }
        .top-bar-left a:hover {
            color: #1a1a1a;
        }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #d9d9d9;
            background: #fff;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #1677ff;
            border-color: #1677ff;
            color: white;
        }
        .btn-primary:hover {
            background: #4096ff;
        }
        .btn-danger {
            border-color: #ff4d4f;
            color: #ff4d4f;
        }
        .btn-danger:hover {
            background: #ff4d4f;
            color: white;
        }
        
        /* 主布局 */
        .editor-layout {
            display: flex;
            margin-top: 56px;
            height: calc(100vh - 56px);
        }
        
        /* 左侧模块库 */
        .module-library {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
        }
        .library-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #333;
        }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .module-card {
            background: #fafafa;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            cursor: grab;
            transition: all 0.2s;
        }
        .module-card:hover {
            border-color: #1677ff;
            background: #f0f7ff;
        }
        .module-card:active {
            cursor: grabbing;
        }
        .module-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .module-name {
            font-size: 12px;
            color: #666;
        }
        
        /* 中间画布区 */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f5f5f5;
        }
        .canvas-toolbar {
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .device-switch {
            display: flex;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            overflow: hidden;
        }
        .device-btn {
            padding: 4px 12px;
            font-size: 12px;
            background: #fff;
            border: none;
            cursor: pointer;
        }
        .device-btn.active {
            background: #1677ff;
            color: white;
        }
        .canvas-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .canvas {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-height: 600px;
            padding: 20px;
            transition: max-width 0.2s;
        }
        .canvas.pc { max-width: 1200px; }
        .canvas.tablet { max-width: 768px; }
        .canvas.mobile { max-width: 375px; }
        
        /* 模块样式 */
        .module-item {
            position: relative;
            margin-bottom: 16px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            background: #fff;
            transition: box-shadow 0.2s;
        }
        .module-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .module-item:hover .module-actions {
            display: flex;
        }
        .module-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: none;
            gap: 4px;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 4px;
        }
        .module-actions button {
            padding: 4px 8px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .edit-module-btn {
            background: #1677ff;
            color: white;
        }
        .delete-module-btn {
            background: #ff4d4f;
            color: white;
        }
        .module-content {
            padding: 16px;
        }
        
        /* 右侧属性面板 */
        .property-panel {
            width: 320px;
            background: #fff;
            border-left: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
        }
        .panel-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        .property-group {
            margin-bottom: 20px;
        }
        .property-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            display: block;
        }
        .property-input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 13px;
        }
        .property-input:focus {
            outline: none;
            border-color: #1677ff;
        }
        .color-input {
            width: 40px;
            height: 32px;
            padding: 2px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
        }
        .no-selection {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }
        
        /* 代码模式 */
        .code-editor {
            width: 100%;
            height: 100%;
            font-family: 'Monaco', monospace;
            font-size: 13px;
            padding: 16px;
            border: none;
            resize: none;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        
        /* 提示消息 */
        .status-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 13px;
            z-index: 1000;
            display: none;
        }
        
        /* 拖拽占位 */
        .sortable-drag {
            opacity: 0.5;
            background: #f0f7ff;
        }
        
        @media (max-width: 1200px) {
            .module-library { width: 240px; }
            .property-panel { width: 280px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-left">
            <h2>ZHAMIT 页面装修</h2>
            <a href="/admin/pages.html">返回页面管理</a>
        </div>
        <div class="top-bar-right">
            <button class="btn" id="previewBtn">👁️ 预览</button>
            <button class="btn" id="codeModeBtn">💻 代码模式</button>
            <button class="btn btn-primary" id="saveBtn">保存发布</button>
        </div>
    </div>
    
    <div class="editor-layout">
        <!-- 左侧模块库 -->
        <div class="module-library">
            <div class="library-title">📦 模块库</div>
            <div class="module-grid">
                <div class="module-card" draggable="true" data-type="text">
                    <div class="module-icon">📝</div>
                    <div class="module-name">文字</div>
                </div>
                <div class="module-card" draggable="true" data-type="heading">
                    <div class="module-icon">📌</div>
                    <div class="module-name">标题</div>
                </div>
                <div class="module-card" draggable="true" data-type="image">
                    <div class="module-icon">🖼️</div>
                    <div class="module-name">图片</div>
                </div>
                <div class="module-card" draggable="true" data-type="button">
                    <div class="module-icon">🔘</div>
                    <div class="module-name">按钮</div>
                </div>
                <div class="module-card" draggable="true" data-type="divider">
                    <div class="module-icon">➖</div>
                    <div class="module-name">分隔线</div>
                </div>
                <div class="module-card" draggable="true" data-type="richText">
                    <div class="module-icon">📄</div>
                    <div class="module-name">富文本</div>
                </div>
            </div>
        </div>
        
        <!-- 中间画布区 -->
        <div class="canvas-area">
            <div class="canvas-toolbar">
                <div class="device-switch">
                    <button class="device-btn active" data-device="pc">PC</button>
                    <button class="device-btn" data-device="tablet">平板</button>
                    <button class="device-btn" data-device="mobile">手机</button>
                </div>
                <span style="font-size:12px; color:#999;">拖拽模块到下方区域</span>
            </div>
            <div class="canvas-container">
                <div id="canvas" class="canvas pc"></div>
                <textarea id="codeEditor" class="code-editor" style="display: none;"></textarea>
            </div>
        </div>
        
        <!-- 右侧属性面板 -->
        <div class="property-panel" id="propertyPanel">
            <div class="panel-title">属性设置</div>
            <div id="panelContent" class="no-selection">
                点击任意模块进行编辑
            </div>
        </div>
    </div>
    
    <div id="toast" class="status-toast"></div>
    
    <!-- 预览弹窗 -->
    <div id="previewModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000;">
        <div style="position:absolute; top:20px; right:20px;">
            <button id="closePreviewBtn" style="background:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">关闭预览</button>
        </div>
        <iframe id="previewFrame" style="width:100%; height:100%; border:none; background:#fff;"></iframe>
    </div>

    <script>
        // 模块数据
        let modules = [];
        let selectedIndex = null;
        let sortable = null;
        let isCodeMode = false;
        
        // 模块模板
        const templates = {
            text: { type: 'text', content: '双击编辑文字', styles: { color: '#333', fontSize: '14px' } },
            heading: { type: 'heading', content: '新标题', level: 'h2', styles: { color: '#333', fontSize: '24px', fontWeight: 'bold' } },
            image: { type: 'image', src: 'https://picsum.photos/400/200', alt: '图片', width: '100%' },
            button: { type: 'button', text: '按钮', url: '#', styles: { backgroundColor: '#1677ff', color: '#fff', padding: '8px 16px', borderRadius: '6px' } },
            divider: { type: 'divider', styles: { height: '1px', backgroundColor: '#e8e8e8', margin: '16px 0' } },
            richText: { type: 'richText', content: '<p>这里是富文本内容，支持<strong>加粗</strong>和<em>斜体</em></p>' }
        };
        
        // 渲染画布
        function renderCanvas() {
            const canvas = document.getElementById('canvas');
            if (!modules.length) {
                canvas.innerHTML = '<div style="text-align:center; padding:60px 20px; color:#999;">✨ 从左侧拖拽模块到这里开始装修</div>';
                return;
            }
            
            canvas.innerHTML = modules.map((mod, idx) => {
                let contentHtml = '';
                switch(mod.type) {
                    case 'text':
                        contentHtml = `<div style="color:${mod.styles?.color || '#333'}; font-size:${mod.styles?.fontSize || '14px'};">${escapeHtml(mod.content || '')}</div>`;
                        break;
                    case 'heading':
                        const tag = mod.level || 'h2';
                        contentHtml = `<${tag} style="color:${mod.styles?.color || '#333'}; font-size:${mod.styles?.fontSize || '24px'}; font-weight:${mod.styles?.fontWeight || 'bold'};">${escapeHtml(mod.content || '')}</${tag}>`;
                        break;
                    case 'image':
                        contentHtml = `<img src="${mod.src || ''}" alt="${mod.alt || ''}" style="width:${mod.width || '100%'}; max-width:100%; border-radius:8px;">`;
                        break;
                    case 'button':
                        contentHtml = `<a href="${mod.url || '#'}" style="display:inline-block; background:${mod.styles?.backgroundColor || '#1677ff'}; color:${mod.styles?.color || '#fff'}; padding:${mod.styles?.padding || '8px 16px'}; border-radius:${mod.styles?.borderRadius || '6px'}; text-decoration:none;">${escapeHtml(mod.text || '按钮')}</a>`;
                        break;
                    case 'divider':
                        contentHtml = `<hr style="height:${mod.styles?.height || '1px'}; background:${mod.styles?.backgroundColor || '#e8e8e8'}; border:none; margin:${mod.styles?.margin || '16px 0'};">`;
                        break;
                    case 'richText':
                        contentHtml = `<div class="rich-text">${mod.content || ''}</div>`;
                        break;
                }
                return `<div class="module-item" data-index="${idx}" data-type="${mod.type}">
                    <div class="module-actions">
                        <button class="edit-module-btn" data-index="${idx}">编辑</button>
                        <button class="delete-module-btn" data-index="${idx}">删除</button>
                    </div>
                    <div class="module-content" onclick="selectModule(${idx})">
                        ${contentHtml}
                    </div>
                </div>`;
            }).join('');
            
            // 绑定删除事件
            document.querySelectorAll('.delete-module-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    modules.splice(idx, 1);
                    if (selectedIndex === idx) {
                        selectedIndex = null;
                        renderPropertyPanel();
                    }
                    renderCanvas();
                });
            });
            
            // 绑定编辑事件
            document.querySelectorAll('.edit-module-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    selectModule(idx);
                });
            });
            
            // 初始化拖拽排序
            if (sortable) sortable.destroy();
            sortable = new Sortable(canvas, {
                animation: 150,
                handle: '.module-item',
                onEnd: () => {
                    const newModules = [];
                    document.querySelectorAll('.module-item').forEach(el => {
                        const idx = parseInt(el.dataset.index);
                        newModules.push(modules[idx]);
                    });
                    modules = newModules;
                    renderCanvas();
                    if (selectedIndex !== null) renderPropertyPanel();
                }
            });
        }
        
        // 选中模块
        function selectModule(index) {
            selectedIndex = index;
            renderPropertyPanel();
            // 高亮选中模块
            document.querySelectorAll('.module-item').forEach(el => {
                el.style.border = '1px solid #e8e8e8';
            });
            const selectedEl = document.querySelector(`.module-item[data-index="${index}"]`);
            if (selectedEl) selectedEl.style.border = '2px solid #1677ff';
        }
        
        // 渲染属性面板
        function renderPropertyPanel() {
            const panel = document.getElementById('panelContent');
            if (selectedIndex === null || !modules[selectedIndex]) {
                panel.innerHTML = '<div class="no-selection">✨ 点击任意模块进行编辑</div>';
                return;
            }
            const mod = modules[selectedIndex];
            
            let html = `<div class="property-group"><label class="property-label">模块类型</label><input class="property-input" value="${mod.type === 'text' ? '文字' : mod.type === 'heading' ? '标题' : mod.type === 'image' ? '图片' : mod.type === 'button' ? '按钮' : mod.type === 'divider' ? '分隔线' : '富文本'}" disabled></div>`;
            
            if (mod.type === 'text' || mod.type === 'heading') {
                html += `<div class="property-group"><label class="property-label">内容</label><input class="property-input" id="editContent" value="${escapeHtml(mod.content || '')}"></div>`;
                html += `<div class="property-group"><label class="property-label">文字颜色</label><input type="color" class="color-input" id="editColor" value="${mod.styles?.color || '#333333'}"></div>`;
                html += `<div class="property-group"><label class="property-label">字体大小</label><input class="property-input" id="editFontSize" value="${mod.styles?.fontSize || (mod.type === 'heading' ? '24px' : '14px')}"></div>`;
                if (mod.type === 'heading') {
                    html += `<div class="property-group"><label class="property-label">标题级别</label><select class="property-input" id="editLevel"><option value="h1">H1</option><option value="h2">H2</option><option value="h3">H3</option></select></div>`;
                }
            } else if (mod.type === 'image') {
                html += `<div class="property-group"><label class="property-label">图片地址</label><input class="property-input" id="editSrc" value="${escapeHtml(mod.src || '')}"></div>`;
                html += `<div class="property-group"><label class="property-label">替代文字</label><input class="property-input" id="editAlt" value="${escapeHtml(mod.alt || '')}"></div>`;
                html += `<div class="property-group"><label class="property-label">宽度</label><input class="property-input" id="editWidth" value="${mod.width || '100%'}"></div>`;
            } else if (mod.type === 'button') {
                html += `<div class="property-group"><label class="property-label">按钮文字</label><input class="property-input" id="editText" value="${escapeHtml(mod.text || '')}"></div>`;
                html += `<div class="property-group"><label class="property-label">链接</label><input class="property-input" id="editUrl" value="${escapeHtml(mod.url || '#')}"></div>`;
                html += `<div class="property-group"><label class="property-label">背景色</label><input type="color" class="color-input" id="editBgColor" value="${mod.styles?.backgroundColor || '#1677ff'}"></div>`;
                html += `<div class="property-group"><label class="property-label">文字颜色</label><input type="color" class="color-input" id="editBtnColor" value="${mod.styles?.color || '#ffffff'}"></div>`;
            } else if (mod.type === 'richText') {
                html += `<div class="property-group"><label class="property-label">富文本内容</label><textarea class="property-input" id="editRichContent" rows="6">${escapeHtml(mod.content || '')}</textarea></div>`;
            }
            
            html += `<div class="property-group"><button class="btn" id="applyPropertyBtn" style="width:100%; background:#1677ff; color:white; border:none;">应用修改</button></div>`;
            panel.innerHTML = html;
            
            // 绑定应用按钮
            document.getElementById('applyPropertyBtn')?.addEventListener('click', () => {
                if (mod.type === 'text' || mod.type === 'heading') {
                    mod.content = document.getElementById('editContent')?.value || '';
                    mod.styles = {
                        color: document.getElementById('editColor')?.value || '#333',
                        fontSize: document.getElementById('editFontSize')?.value || (mod.type === 'heading' ? '24px' : '14px')
                    };
                    if (mod.type === 'heading') {
                        mod.level = document.getElementById('editLevel')?.value || 'h2';
                    }
                } else if (mod.type === 'image') {
                    mod.src = document.getElementById('editSrc')?.value || '';
                    mod.alt = document.getElementById('editAlt')?.value || '';
                    mod.width = document.getElementById('editWidth')?.value || '100%';
                } else if (mod.type === 'button') {
                    mod.text = document.getElementById('editText')?.value || '';
                    mod.url = document.getElementById('editUrl')?.value || '#';
                    mod.styles = {
                        backgroundColor: document.getElementById('editBgColor')?.value || '#1677ff',
                        color: document.getElementById('editBtnColor')?.value || '#ffffff',
                        padding: '8px 16px',
                        borderRadius: '6px'
                    };
                } else if (mod.type === 'richText') {
                    mod.content = document.getElementById('editRichContent')?.value || '';
                }
                renderCanvas();
                renderPropertyPanel();
                showToast('修改已应用');
            });
            
            // 设置选中值
            setTimeout(() => {
                if (mod.type === 'heading' && document.getElementById('editLevel')) {
                    document.getElementById('editLevel').value = mod.level || 'h2';
                }
            }, 0);
        }
        
        // 添加模块
        function addModule(type) {
            const newModule = JSON.parse(JSON.stringify(templates[type]));
            modules.push(newModule);
            renderCanvas();
            showToast(`已添加${type === 'text' ? '文字' : type === 'heading' ? '标题' : type === 'image' ? '图片' : type === 'button' ? '按钮' : type === 'divider' ? '分隔线' : '富文本'}模块`);
        }
        
        // 拖拽添加
        function setupDragDrop() {
            const draggables = document.querySelectorAll('[draggable="true"]');
            draggables.forEach(el => {
                el.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', el.dataset.type);
                });
            });
            const canvas = document.getElementById('canvas');
            canvas.addEventListener('dragover', (e) => e.preventDefault());
            canvas.addEventListener('drop', (e) => {
                e.preventDefault();
                const type = e.dataTransfer.getData('text/plain');
                if (type) addModule(type);
            });
        }
        
        // 设备切换
        function setupDeviceSwitch() {
            const btns = document.querySelectorAll('.device-btn');
            const canvas = document.getElementById('canvas');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    canvas.className = `canvas ${btn.dataset.device}`;
                });
            });
        }
        
        // 代码模式
        function setupCodeMode() {
            const btn = document.getElementById('codeModeBtn');
            const canvas = document.getElementById('canvas');
            const codeEditor = document.getElementById('codeEditor');
            btn.addEventListener('click', () => {
                isCodeMode = !isCodeMode;
                if (isCodeMode) {
                    codeEditor.value = modulesToHtml();
                    canvas.style.display = 'none';
                    codeEditor.style.display = 'block';
                    btn.textContent = '🎨 可视化模式';
                } else {
                    canvas.style.display = 'block';
                    codeEditor.style.display = 'none';
                    btn.textContent = '💻 代码模式';
                }
            });
        }
        
        function modulesToHtml() {
            return modules.map(mod => {
                switch(mod.type) {
                    case 'text': return `<div style="color:${mod.styles?.color || '#333'}; font-size:${mod.styles?.fontSize || '14px'};">${mod.content || ''}</div>`;
                    case 'heading': return `<${mod.level || 'h2'} style="color:${mod.styles?.color || '#333'}; font-size:${mod.styles?.fontSize || '24px'}; font-weight:bold;">${mod.content || ''}</${mod.level || 'h2'}>`;
                    case 'image': return `<img src="${mod.src || ''}" alt="${mod.alt || ''}" style="width:${mod.width || '100%'}; max-width:100%;">`;
                    case 'button': return `<a href="${mod.url || '#'}" style="display:inline-block; background:${mod.styles?.backgroundColor || '#1677ff'}; color:${mod.styles?.color || '#fff'}; padding:8px 16px; border-radius:6px; text-decoration:none;">${mod.text || '按钮'}</a>`;
                    case 'divider': return `<hr style="height:${mod.styles?.height || '1px'}; background:${mod.styles?.backgroundColor || '#e8e8e8'}; border:none; margin:16px 0;">`;
                    case 'richText': return `<div>${mod.content || ''}</div>`;
                    default: return '';
                }
            }).join('\n');
        }
        
        // 预览
        function preview() {
            const modal = document.getElementById('previewModal');
            const iframe = document.getElementById('previewFrame');
            const content = modulesToHtml();
            iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body style="margin:0; padding:20px; font-family:system-ui;">${content || '<p>暂无内容</p>'}</body></html>`;
            modal.style.display = 'block';
        }
        
        // 保存
        async function savePage() {
            const content = modulesToHtml();
            const urlParams = new URLSearchParams(window.location.search);
            const pageId = urlParams.get('id');
            
            // 简单获取路径和标题（可以从 URL 参数或弹窗获取）
            const path = prompt('页面路径 (如 /about):', pageId ? '' : '/new-page');
            if (!path) return;
            const title = prompt('页面标题:', 'New Page');
            if (!title) return;
            
            const data = {
                id: pageId || null,
                path: path,
                title_en: title,
                content: content,
                status: 1
            };
            
            try {
                const res = await fetch('/api/pages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showToast('保存成功！');
                    setTimeout(() => { window.location.href = '/admin/pages.html'; }, 1000);
                } else {
                    showToast('保存失败');
                }
            } catch(e) {
                showToast('保存失败: ' + e.message);
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        // 加载已有页面内容
        async function loadExistingPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const pageId = urlParams.get('id');
            if (!pageId) return;
            try {
                const res = await fetch(`/api/pages?id=${pageId}`);
                const page = await res.json();
                if (page && page.content) {
                    // 这里简化解析，实际需要解析 HTML 为模块
                    // 暂时先不处理，提示用户
                    showToast('已加载页面，当前编辑器仅支持新建内容');
                }
            } catch(e) {}
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadExistingPage();
            setupDragDrop();
            setupDeviceSwitch();
            setupCodeMode();
            document.getElementById('previewBtn').addEventListener('click', preview);
            document.getElementById('saveBtn').addEventListener('click', savePage);
            document.getElementById('closePreviewBtn').addEventListener('click', () => {
                document.getElementById('previewModal').style.display = 'none';
            });
            renderCanvas();
        });
        
        window.selectModule = selectModule;
    </script>
</body>
</html>
