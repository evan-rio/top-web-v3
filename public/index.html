<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ZHAMIT - 专业家居贸易</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #1a1a1a;
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* 顶部导航 */
        .top-nav {
            background: #1a1a1a;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }
        
        .top-nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
        }
        
        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
        }
        
        /* 导航菜单 */
        .top-nav-menu {
            display: flex;
            list-style: none;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .top-nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.25rem 0;
            white-space: nowrap;
        }
        
        .top-nav-menu a:hover {
            opacity: 0.8;
        }
        
        /* 主内容区 - 关键：让内容撑开，自动滚动 */
        main {
            flex: 1;
            width: 100%;
        }
        
        /* 英雄区 */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
        }
        
        .hero h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .hero p {
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
            opacity: 0.9;
        }
        
        /* 产品区 */
        .products {
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        .products h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        .product-card {
            background: #f9f9f9;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .product-card:hover {
            transform: translateY(-2px);
        }
        
        .product-card-content {
            padding: 1.5rem;
            text-align: center;
        }
        
        .product-card h3 {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        
        .product-card p {
            color: #666;
            font-size: 0.85rem;
        }
        
        /* 底部导航 */
        .bottom-nav {
            background: #f5f5f5;
            padding: 2rem 1rem 1rem;
            margin-top: auto;
            width: 100%;
        }
        
        .bottom-nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: space-between;
        }
        
        .bottom-nav-col {
            flex: 1;
            min-width: 120px;
        }
        
        .bottom-nav-col h4 {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            color: #333;
        }
        
        .bottom-nav-col a {
            display: block;
            color: #666;
            text-decoration: none;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
        }
        
        .bottom-nav-col a:hover {
            color: #1a1a1a;
        }
        
        /* 版权 */
        .copyright {
            text-align: center;
            padding: 1rem;
            background: #eaeaea;
            font-size: 0.7rem;
            color: #666;
            width: 100%;
        }
        
        /* 移动端优化 */
        @media (max-width: 768px) {
            .top-nav-container {
                flex-direction: column;
                padding: 0.5rem 1rem;
            }
            
            .top-nav-menu {
                justify-content: center;
                gap: 0.75rem;
            }
            
            .hero {
                padding: 2rem 1rem;
            }
            
            .hero h1 {
                font-size: 1.5rem;
            }
            
            .hero p {
                font-size: 0.85rem;
            }
            
            .products {
                padding: 1.5rem 1rem;
            }
            
            .products h2 {
                font-size: 1.25rem;
            }
            
            .product-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .bottom-nav-container {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .bottom-nav-col {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="top-nav-container">
            <div class="logo-area" id="logoArea">
                <span class="logo-text">ZHAMIT</span>
            </div>
            <ul class="top-nav-menu" id="navMenu">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </div>
    </nav>
    
    <main>
        <section class="hero">
            <h1>ZHAMIT</h1>
            <p>专业家居贸易公司 · 源自中国义乌</p>
        </section>
        
        <section class="products">
            <h2>精选产品</h2>
            <div class="product-grid">
                <div class="product-card">
                    <div class="product-card-content">
                        <h3>家居用品</h3>
                        <p>高品质家居好物，现货供应</p>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-card-content">
                        <h3>厨房用品</h3>
                        <p>实用美观，可定制包装</p>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-card-content">
                        <h3>装饰摆件</h3>
                        <p>限量款式，每周更新</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <div class="bottom-nav">
        <div class="bottom-nav-container" id="bottomNav">
            <div class="bottom-nav-col">
                <h4>ZHAMIT</h4>
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
            </div>
        </div>
    </div>
    <div class="copyright">
        © 2025 YIWU ZHAMIT TRADING LIMITED. All Rights Reserved.
    </div>

    <script>
        // 加载动态导航菜单（如果 API 可用）
        async function loadDynamicNav() {
            try {
                const res = await fetch('/api/nav?location=top');
                const items = await res.json();
                if (items && items.length) {
                    const topParents = items.filter(i => i.parent_id === 0).sort((a,b) => a.sort_order - b.sort_order);
                    const navMenu = document.getElementById('navMenu');
                    if (topParents.length) {
                        navMenu.innerHTML = topParents.map(parent => `<li><a href="${parent.url}">${escapeHtml(parent.name)}</a></li>`).join('');
                    }
                }
            } catch(e) {
                // 静默失败，使用默认导航
            }
            
            try {
                const bottomRes = await fetch('/api/nav?location=bottom');
                const bottomItems = await bottomRes.json();
                if (bottomItems && bottomItems.length) {
                    const bottomParents = bottomItems.filter(i => i.parent_id === 0).sort((a,b) => a.sort_order - b.sort_order);
                    const bottomNav = document.getElementById('bottomNav');
                    if (bottomParents.length) {
                        bottomNav.innerHTML = bottomParents.map(parent => {
                            const children = bottomItems.filter(i => i.parent_id === parent.id).sort((a,b) => a.sort_order - b.sort_order);
                            if (children.length) {
                                return `<div class="bottom-nav-col">
                                    <h4>${escapeHtml(parent.name)}</h4>
                                    ${children.map(child => `<a href="${child.url}">${escapeHtml(child.name)}</a>`).join('')}
                                </div>`;
                            }
                            return `<div class="bottom-nav-col"><h4>${escapeHtml(parent.name)}</h4><a href="${parent.url}">${escapeHtml(parent.name)}</a></div>`;
                        }).join('');
                    }
                }
            } catch(e) {}
        }
        
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                const logoArea = document.getElementById('logoArea');
                if (settings.logo_type === 'image' && settings.logo_url) {
                    logoArea.innerHTML = `<img src="${settings.logo_url}" alt="${settings.logo_alt}" style="height:32px; width:auto;">`;
                } else {
                    const text = settings.brand_text || 'ZHAMIT';
                    logoArea.innerHTML = `<span class="logo-text">${escapeHtml(text)}</span>`;
                }
            } catch(e) {}
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        loadDynamicNav();
        loadSettings();
    </script>
</body>
</html>
