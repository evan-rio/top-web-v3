<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAMIT - 专业家居贸易</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a; background: #fff; }
        
        /* 顶部导航 */
        .top-nav { background: #1a1a1a; color: white; padding: 0 2rem; position: sticky; top: 0; z-index: 100; }
        .top-nav-container { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; min-height: 70px; }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-text { font-size: 24px; font-weight: 600; }
        .logo-img { height: 40px; width: auto; }
        .top-nav-menu { display: flex; list-style: none; gap: 2rem; }
        .top-nav-menu a { color: white; text-decoration: none; font-weight: 500; }
        .top-nav-menu a:hover { color: #ccc; }
        
        /* 英雄区 */
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; padding: 5rem 2rem; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.25rem; max-width: 600px; margin: 0 auto; opacity: 0.9; }
        
        /* 产品区 */
        .products { padding: 4rem 2rem; max-width: 1280px; margin: 0 auto; }
        .products h2 { text-align: center; margin-bottom: 2rem; font-size: 2rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .product-card { background: #f9f9f9; border-radius: 12px; overflow: hidden; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-4px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .product-card h3 { padding: 1rem 1rem 0.5rem; }
        .product-card p { padding: 0 1rem 1rem; color: #666; }
        
        /* 底部 */
        .bottom-nav { background: #f5f5f5; padding: 3rem 2rem; margin-top: 4rem; }
        .bottom-nav-container { max-width: 1280px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 3rem; }
        .bottom-nav-col { flex: 1; min-width: 150px; }
        .bottom-nav-col h4 { margin-bottom: 1rem; }
        .bottom-nav-col a { display: block; color: #666; text-decoration: none; margin-bottom: 0.5rem; }
        .copyright { text-align: center; padding: 1rem; background: #eaeaea; font-size: 0.75rem; color: #666; }
        
        @media (max-width: 768px) {
            .top-nav-container { flex-direction: column; padding: 1rem; gap: 1rem; }
            .top-nav-menu { flex-wrap: wrap; justify-content: center; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="top-nav-container">
            <div class="logo-area" id="logoArea">
                <span class="logo-text">ZHAMIT</span>
            </div>
            <ul class="top-nav-menu" id="navMenu"></ul>
        </div>
    </nav>
    
    <section class="hero">
        <h1>ZHAMIT</h1>
        <p>专业家居贸易公司 · 源自中国义乌</p>
    </section>
    
    <section class="products">
        <h2>精选产品</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-card-content" style="padding: 2rem; text-align: center;">
                    <h3>家居用品</h3>
                    <p>高品质家居好物，现货供应</p>
                </div>
            </div>
            <div class="product-card">
                <div class="product-card-content" style="padding: 2rem; text-align: center;">
                    <h3>厨房用品</h3>
                    <p>实用美观，可定制包装</p>
                </div>
            </div>
            <div class="product-card">
                <div class="product-card-content" style="padding: 2rem; text-align: center;">
                    <h3>装饰摆件</h3>
                    <p>限量款式，每周更新</p>
                </div>
            </div>
        </div>
    </section>
    
    <div class="bottom-nav">
        <div class="bottom-nav-container" id="bottomNav"></div>
    </div>
    <div class="copyright">
        © 2025 YIWU ZHAMIT TRADING LIMITED. All Rights Reserved.
    </div>
    
    <script>
        // 加载导航菜单
        async function loadNav() {
            try {
                const res = await fetch('/api/nav');
                const items = await res.json();
                
                // 渲染顶部导航
                const topItems = items.filter(i => i.parent_id === 0).sort((a,b) => a.sort_order - b.sort_order);
                const navMenu = document.getElementById('navMenu');
                navMenu.innerHTML = topItems.map(item => `<li><a href="${item.url}">${item.name}</a></li>`).join('');
                
                // 渲染底部导航
                const groups = {};
                topItems.forEach(item => { groups[item.id] = { name: item.name, children: [] }; });
                items.forEach(item => {
                    if (item.parent_id && groups[item.parent_id]) {
                        groups[item.parent_id].children.push(item);
                    }
                });
                const bottomNav = document.getElementById('bottomNav');
                bottomNav.innerHTML = Object.values(groups).map(group => `
                    <div class="bottom-nav-col">
                        <h4>${group.name}</h4>
                        ${group.children.map(child => `<a href="${child.url}">${child.name}</a>`).join('')}
                    </div>
                `).join('');
            } catch(e) {
                console.error('加载导航失败:', e);
            }
        }
        
        // 加载站点设置（Logo等）
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                const logoArea = document.getElementById('logoArea');
                if (settings.logo_type === 'image' && settings.logo_url) {
                    logoArea.innerHTML = `<img src="${settings.logo_url}" alt="${settings.logo_alt}" class="logo-img">`;
                } else {
                    const text = settings.brand_text || 'ZHAMIT';
                    const font = settings.brand_text_font || 'Arial';
                    const size = settings.brand_text_size || '24px';
                    const transform = settings.brand_text_transform || 'none';
                    logoArea.innerHTML = `<span class="logo-text" style="font-family:${font}; font-size:${size}; text-transform:${transform}">${text}</span>`;
                }
            } catch(e) {
                console.error('加载设置失败:', e);
            }
        }
        
        loadNav();
        loadSettings();
    </script>
</body>
</html>
