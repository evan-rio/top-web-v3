<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAMIT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; line-height: 1.6; color: #1a1a1a; background: #fff; }
        .top-nav { background: #1a1a1a; color: white; padding: 0 2rem; position: sticky; top: 0; z-index: 100; }
        .top-nav-container { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; min-height: 70px; }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-text { font-size: 24px; font-weight: 600; color: white; }
        .top-nav-menu { display: flex; list-style: none; gap: 2rem; }
        .top-nav-menu a { color: white; text-decoration: none; font-weight: 500; }
        .bottom-nav { background: #f5f5f5; padding: 3rem 2rem; margin-top: 4rem; }
        .bottom-nav-container { max-width: 1280px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 3rem; }
        .bottom-nav-col { flex: 1; min-width: 150px; }
        .bottom-nav-col h4 { margin-bottom: 1rem; }
        .bottom-nav-col a { display: block; color: #666; text-decoration: none; margin-bottom: 0.5rem; }
        .copyright { text-align: center; padding: 1rem; background: #eaeaea; font-size: 0.75rem; color: #666; }
        main { min-height: 50vh; padding: 2rem; max-width: 1280px; margin: 0 auto; }
        @media (max-width: 768px) {
            .top-nav-container { flex-direction: column; padding: 1rem; gap: 1rem; }
            .top-nav-menu { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="top-nav-container">
            <div class="logo-area">
                <span class="logo-text">ZHAMIT</span>
            </div>
            <ul class="top-nav-menu" id="navMenu"></ul>
        </div>
    </nav>
    
    <main id="pageContent">
        <div style="text-align: center; padding: 2rem;">加载中...</div>
    </main>
    
    <div class="bottom-nav">
        <div class="bottom-nav-container" id="bottomNav"></div>
    </div>
    <div class="copyright">
        © 2025 YIWU ZHAMIT TRADING LIMITED. All Rights Reserved.
    </div>
    
    <script>
        const currentPath = window.location.pathname;
        
        async function loadPage() {
            try {
                const res = await fetch(`/api/pages?path=${encodeURIComponent(currentPath)}`);
                if (res.ok) {
                    const page = await res.json();
                    if (page && page.content) {
                        document.getElementById('pageContent').innerHTML = page.content;
                        document.title = page.title_en || 'ZHAMIT';
                    } else {
                        document.getElementById('pageContent').innerHTML = '<h1>页面未找到</h1><p>您访问的页面不存在。</p>';
                    }
                } else {
                    document.getElementById('pageContent').innerHTML = '<h1>页面未找到</h1><p>您访问的页面不存在。</p>';
                }
            } catch(e) {
                document.getElementById('pageContent').innerHTML = '<h1>加载失败</h1><p>请稍后重试。</p>';
            }
        }
        
        async function loadNav() {
            try {
                const res = await fetch('/api/nav');
                const items = await res.json();
                const topItems = items.filter(i => i.parent_id === 0).sort((a,b) => a.sort_order - b.sort_order);
                const navMenu = document.getElementById('navMenu');
                if (topItems.length) {
                    navMenu.innerHTML = topItems.map(item => `<li><a href="${item.url}">${item.name}</a></li>`).join('');
                } else {
                    navMenu.innerHTML = '<li><a href="/">Home</a></li><li><a href="/about">About</a></li><li><a href="/contact">Contact</a></li>';
                }
                
                const groups = {};
                topItems.forEach(item => { groups[item.id] = { name: item.name, children: [] }; });
                items.forEach(item => {
                    if (item.parent_id && groups[item.parent_id]) {
                        groups[item.parent_id].children.push(item);
                    }
                });
                const bottomNav = document.getElementById('bottomNav');
                if (Object.keys(groups).length) {
                    bottomNav.innerHTML = Object.values(groups).map(group => `
                        <div class="bottom-nav-col">
                            <h4>${group.name}</h4>
                            ${group.children.map(child => `<a href="${child.url}">${child.name}</a>`).join('')}
                        </div>
                    `).join('');
                } else {
                    bottomNav.innerHTML = '<div class="bottom-nav-col"><h4>ZHAMIT</h4><a href="/">Home</a><a href="/about">About</a><a href="/contact">Contact</a></div>';
                }
            } catch(e) {
                console.error('加载导航失败:', e);
            }
        }
        
        loadPage();
        loadNav();
    </script>
</body>
</html>
